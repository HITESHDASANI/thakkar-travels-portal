<!DOCTYPE html>
<html>
<head>
<title>Flight Booking</title>
</head>

<body>

<h2>Available Flights</h2>

<table border="1">

<thead>
<tr>
<th>Airline</th>
<th>From</th>
<th>To</th>
<th>Price</th>
</tr>
</thead>

<tbody id="flights"></tbody>

</table>

<script>

async function loadFlights(){

const res=await fetch("http://localhost:3000/api/flights/search")

const data=await res.json()

let html=""

data.forEach(f=>{

html+=`
<tr>
<td>${f.airline}</td>
<td>${f.from}</td>
<td>${f.to}</td>
<td>${f.price}</td>
</tr>
`

})

document.getElementById("flights").innerHTML=html

}

loadFlights()

</script>

</body>
</html>
