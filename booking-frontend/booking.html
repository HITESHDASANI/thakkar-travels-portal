<!DOCTYPE html>
<html>
<head>
<title>Book Flight</title>
</head>

<body>

<h2>Passenger Details</h2>

<input id="name" placeholder="Full Name"><br><br>
<input id="email" placeholder="Email"><br><br>

<button onclick="confirmBooking()">Confirm Booking</button>
<button onclick="payNow()">Pay & Book</button>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
async function payNow() {

  const amount = 5000

  const res = await fetch("http://localhost:3000/api/payment/create-order", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ amount })
  })

  const order = await res.json()

  const options = {
    key: "YOUR_KEY_ID",
    amount: order.amount,
    currency: "INR",
    name: "Thakkar Travels",
    order_id: order.id,

    handler: async function () {

      const flight = JSON.parse(localStorage.getItem("selectedFlight"))

      const bookingRes = await fetch("http://localhost:3000/api/bookings", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name: document.getElementById("name").value,
          email: document.getElementById("email").value,
          flight
        })
      })

      const data = await bookingRes.json()

      alert("Booking Confirmed ✅ PNR: " + data.pnr)

      window.location.href = `ticket.html?id=${data._id}`
    }
  }

  const rzp = new Razorpay(options)
  rzp.open()
}
</script>

<script src="./js/config.js"></script>

<script>
async function confirmBooking() {

  const flight = JSON.parse(localStorage.getItem("selectedFlight"))

  const res = await fetch(`${API}/api/bookings`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      flight
    })
  })

  const data = await res.json()

  alert("Booking Confirmed! PNR: " + data.pnr)

}
</script>

</body>
</html>
