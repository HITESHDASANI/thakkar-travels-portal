<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thakkar Travels - Search Flights</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
}
.container {
  width: 400px;
  margin: 100px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}
input, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}
button {
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h2>✈️ Search Flights</h2>

  <input id="from" placeholder="From (DEL)">
  <input id="to" placeholder="To (BOM)">
  <input id="date" type="date">

  <button onclick="searchFlights()">Search</button>
</div>

<script src="./js/config.js"></script>
<script src="./js/search.js"></script>

</body>
</html>
